<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>The Pawn</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="game-panel" aria-label="The Pawn">
      <div class="screen">
        <img id="sceneImage" alt="The Pawn scene artwork" width="320" height="152">
      </div>

      <div class="transcript" id="transcript" aria-live="polite" aria-label="Game transcript"></div>

      <form class="command-line" id="commandForm" autocomplete="off">
        <span>&gt;</span>
        <input id="commandInput" name="command" type="text" spellcheck="false" autofocus>
      </form>

      <details class="tool-drawer">
        <summary>Tools</summary>
        <div class="tool-body">
          <header class="titlebar">
            <div>
              <h1>The Pawn</h1>
              <p>Original text with updated graphics</p>
            </div>
          </header>

          <section class="debug-panel" aria-label="Debug menu">
            <div class="debug-head">
              <h2>Debug Menu</h2>
              <span id="sceneCount">0 scenes</span>
            </div>
            <div class="scene-select-row">
              <label class="select-box">
                <span>Scene</span>
                <select id="sceneSelect"></select>
              </label>
              <button id="loadSceneButton" class="scene-load-button" type="button">Load Scene</button>
            </div>
            <div class="debug-columns">
              <section>
                <h3>Scene Messages</h3>
                <div id="sceneMessages" class="debug-list"></div>
              </section>
              <section>
                <h3>Interactions</h3>
                <div id="sceneInteractions" class="debug-list"></div>
              </section>
            </div>
          </section>

          <div class="asset-strip" aria-live="polite">
            <div>
              <span>Image</span>
              <strong id="imageId">path</strong>
            </div>
            <div>
              <span>Text</span>
              <strong id="textId">0000</strong>
            </div>
            <div>
              <span>Location</span>
              <strong id="roomTitle">On The Path</strong>
            </div>
          </div>

          <article class="location-card">
            <p id="locationText"></p>
            <div class="exit-list" id="exitList"></div>
          </article>

          <aside class="catalog-panel" aria-label="Scene responses">
            <div class="catalog-head">
              <h2>Scene Responses</h2>
              <span id="sceneResponseCount">0</span>
            </div>
            <div class="result-list" id="sceneResponseList"></div>
          </aside>
        </div>
      </details>
    </section>
  </main>

  <script src="assets.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
